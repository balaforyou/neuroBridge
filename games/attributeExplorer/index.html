<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Explorer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { touch-action: none; -webkit-tap-highlight-color: transparent; }
        @keyframes ae-celebrate-pop {
            0% { opacity: 0; transform: translateY(8px) scale(0.86); }
            35% { opacity: 1; transform: translateY(0) scale(1.05); }
            100% { opacity: 0; transform: translateY(-16px) scale(1); }
        }
        .celebrate-pop { animation: ae-celebrate-pop 800ms ease-out both; }
    </style>
</head>
<body class="bg-sky-50 text-slate-950 h-screen w-screen overflow-hidden select-none">
    <main class="h-full w-full flex flex-col p-2 gap-2">
        <header class="shrink-0 bg-white border-2 border-sky-300 rounded-xl px-4 py-1.5 flex items-center justify-between text-xs text-sky-900 shadow-sm">
            <div class="font-black">Attribute Explorer</div>
            <div class="flex items-center gap-4">
                <div>Trial <span id="ui-trial" class="font-black text-sky-950">1/5</span></div>
                <div>Stars <span id="ui-streak" class="font-black text-emerald-700">0</span></div>
                <button id="hint-button" class="px-3 py-1.5 rounded-full bg-amber-200 hover:bg-amber-300 active:bg-amber-400 text-amber-950 text-xs font-black border-2 border-amber-500 transition focus:outline-none focus:ring-4 focus:ring-amber-400/60">
                    Give Hint
                </button>
            </div>
        </header>

        <section class="relative flex-1 min-h-0 bg-white rounded-2xl border-4 border-sky-300 shadow-xl grid grid-rows-[auto_minmax(0,1fr)_auto] gap-1.5 p-3 overflow-hidden">
            <div id="celebration-burst" class="pointer-events-none absolute top-14 left-1/2 -translate-x-1/2 text-4xl opacity-0">✓</div>

            <div class="text-center space-y-1">
                <div id="attribute-prompt" class="inline-flex items-center justify-center rounded-xl bg-yellow-300 border-4 border-yellow-500 px-5 py-2 text-xl sm:text-2xl font-black text-slate-950 shadow-sm">
                    🎨 LOOK AT COLOR
                </div>
                <div id="feedback-text" class="text-base sm:text-lg font-black text-sky-900 min-h-[24px]">Same or Different?</div>
            </div>

            <div id="item-stage" class="min-h-0 w-full flex items-center justify-center gap-5 sm:gap-10 overflow-visible">
                <div id="item-a" class="relative w-48 h-44 sm:w-56 sm:h-52 rounded-2xl bg-white border-4 border-sky-300 shadow-sm flex items-center justify-center"></div>
                <div id="item-b" class="relative w-48 h-44 sm:w-56 sm:h-52 rounded-2xl bg-white border-4 border-sky-300 shadow-sm flex items-center justify-center"></div>
            </div>

            <div id="answer-dock" class="w-full max-w-xl mx-auto grid grid-cols-2 gap-3">
                <button data-choice="same" class="answer-button h-12 sm:h-14 rounded-xl bg-emerald-500 hover:bg-emerald-400 active:bg-emerald-600 text-emerald-950 text-xl sm:text-2xl font-black shadow-md border-4 border-emerald-700 transition transform hover:scale-[1.02] focus:outline-none focus:ring-8 focus:ring-emerald-300">
                    Same
                </button>
                <button data-choice="different" class="answer-button h-12 sm:h-14 rounded-xl bg-fuchsia-500 hover:bg-fuchsia-400 active:bg-fuchsia-600 text-fuchsia-950 text-xl sm:text-2xl font-black shadow-md border-4 border-fuchsia-800 transition transform hover:scale-[1.02] focus:outline-none focus:ring-8 focus:ring-fuchsia-300">
                    Different
                </button>
            </div>
        </section>
    </main>

    <script type="module" src="./game.js"></script>
</body>
</html>
