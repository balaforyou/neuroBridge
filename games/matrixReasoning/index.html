<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Reasoning Module</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Shared platform global layouts to prevent viewport scroll jumping */
        body { touch-action: none; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 p-4 h-screen w-screen overflow-hidden select-none flex flex-col items-center justify-between">

    <!-- Top Block Header Indicators -->
    <header class="w-full max-w-5xl bg-slate-950 px-4 py-2.5 rounded-xl border border-slate-800 flex justify-between items-center text-xs text-slate-400 shrink-0">
        <div>Stage: <span id="ui-stage" class="text-indigo-400 font-bold">1</span> (<span id="ui-stage-name">Linear Numbers</span>)</div>
        <div>Trial: <span id="ui-trial" class="text-slate-200">1/5</span></div>
        <div>Streak: <span id="ui-streak" class="text-emerald-400 font-bold">0</span></div>
    </header>

    <!-- Unified Split Screen Dashboard Workspace -->
    <main class="w-full max-w-5xl flex-1 flex flex-row items-stretch justify-center my-4 gap-4 min-h-0 min-w-0 overflow-hidden">
        
        <!-- LEFT WING: Permanent Game Engine Canvas & Dock Operations Hub -->
        <section class="flex-1 bg-slate-950/40 rounded-2xl border border-slate-800/60 p-4 flex flex-col items-center justify-between min-h-0 min-w-0">
            <!-- Center Aligned Matrix Presentation Display -->
            <div class="flex-1 flex items-center justify-center min-h-0 w-full">
                <div id="matrix-grid" class="grid grid-cols-2 gap-0 bg-white p-3 rounded-xl border-4 border-black shadow-2xl shrink-0 transition-transform duration-200">
                    <!-- Injected dynamically -->
                </div>
            </div>

            <!-- Selection Options Grid Dock -->
            <div id="options-dock" class="w-full grid grid-cols-4 gap-3 bg-slate-950 p-3 rounded-xl border border-slate-800 shrink-0 mt-2">
                <!-- Option buttons managed via script loops -->
            </div>
        </section>

        <!-- RIGHT WING: Universal Split Context Panel (Reviews, Metrics & Explanations) -->
        <section id="decoder-panel" class="w-80 shrink-0 bg-slate-950 border border-slate-800 rounded-2xl p-4 flex flex-col justify-between hidden min-h-0">
            <!-- Injected dynamically via review triggers -->
        </section>

    </main>

   <script type="module" src="./games.js"></script>
</body>
</html>
